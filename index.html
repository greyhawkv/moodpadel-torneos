/* ═══════════════════════════════════════════════════════════════
   MOODPADEL — Gestor de torneos de pádel / tenis por equipos
   MVP sin login. Persistencia local. Vista pública por QR.
   ═══════════════════════════════════════════════════════════════ */

/* ---------- Estilos ---------- */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;600;800&family=Karla:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Poppins:wght@800&display=swap');

.pista-app{
  --tiza:#F4F1E9; --papel:#FFFFFF; --tinta:#12130F; --pista:#171D16; --pista2:#2A3527;
  --pelota:#EEFD6F; --falta:#FF5A3C; --gris:#767D73; --linea:#E4DFD2;
  --display:'Big Shoulders Display','Arial Narrow',sans-serif;
  --body:'Karla',system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  background:var(--tiza); color:var(--tinta); font-family:var(--body);
  min-height:100vh; font-size:15px; line-height:1.45;
}
.pista-app *{box-sizing:border-box}
.pista-app h1,.pista-app h2,.pista-app h3{font-family:var(--display);font-weight:800;letter-spacing:.01em;text-transform:uppercase;margin:0;line-height:.95}
.pista-app h1{font-size:clamp(30px,5vw,52px)}
.brand-logo{height:clamp(32px,5.2vw,48px);width:auto;display:block}
.pista-app h2{font-size:26px}
.pista-app h3{font-size:18px;letter-spacing:.04em}
.pista-app button{font-family:var(--body);cursor:pointer}
.pista-app :focus-visible{outline:2px solid var(--pista);outline-offset:2px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* estructura */
.wrap{max-width:1080px;margin:0 auto;padding:0 16px 80px}
.topbar{background:var(--pista);color:#fff;padding:18px 0 0}
.topbar .wrap{padding-bottom:0}
.topbar h1{color:#fff}
.topline{display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px;justify-content:space-between;padding-bottom:14px}
.meta{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7)}
.chip{display:inline-block;background:var(--pelota);color:var(--tinta);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:2px;font-weight:600}
.chip.ghost{background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff}
.chip.dark{background:var(--tinta);color:#fff}

/* tabs */
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:0;border-bottom:3px solid transparent;color:rgba(255,255,255,.6);
  font-family:var(--display);font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  padding:10px 14px;white-space:nowrap}
.tab[aria-selected="true"]{color:#fff;border-bottom-color:var(--pelota)}
.tab:disabled{opacity:.3;cursor:not-allowed}

/* cards */
.card{background:var(--papel);border:1px solid var(--linea);border-radius:4px;padding:16px;margin-top:16px}
.card>h3{margin-bottom:12px}
.sub{color:var(--gris);font-size:13px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gris)}

/* botones */
.btn{border:1px solid var(--tinta);background:var(--tinta);color:#fff;padding:9px 14px;border-radius:3px;
  font-weight:700;font-size:14px;letter-spacing:.01em}
.btn:hover{background:#000}
.btn.primary{background:var(--pista);border-color:var(--pista)}
.btn.primary:hover{background:var(--pista2)}
.btn.ball{background:var(--pelota);border-color:var(--pelota);color:var(--tinta)}
.btn.ghost{background:transparent;color:var(--tinta)}
.btn.ghost:hover{background:rgba(0,0,0,.05)}
.btn.danger{background:transparent;border-color:var(--falta);color:var(--falta)}
.btn.danger:hover{background:var(--falta);color:#fff}
.btn.sm{padding:5px 9px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* forms */
label.f{display:block;margin-bottom:10px}
label.f>span{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gris);margin-bottom:4px}
.inp{width:100%;padding:9px 10px;border:1px solid var(--linea);border-radius:3px;background:#fff;font-family:var(--body);font-size:15px;color:var(--tinta)}
.inp:focus{border-color:var(--pista)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:0 14px}
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr}}

/* opciones del wizard */
.opt{display:block;width:100%;text-align:left;border:1px solid var(--linea);background:#fff;border-radius:3px;padding:12px 14px;margin-bottom:8px}
.opt:hover{border-color:var(--pista)}
.opt[aria-pressed="true"]{border-color:var(--pista);border-left:4px solid var(--pelota);background:#FBFEE3}
.opt b{font-family:var(--display);font-size:19px;text-transform:uppercase;letter-spacing:.03em}

/* marcador — elemento firma */
.match{display:flex;align-items:stretch;gap:0;border:1px solid var(--linea);border-radius:3px;background:#fff;
  width:100%;text-align:left;padding:0;overflow:hidden;margin-bottom:6px}
.match:hover{border-color:var(--pista)}
.match .side{flex:1;min-width:0;display:flex;flex-direction:column}
.side .tm{display:flex;align-items:center;gap:8px;padding:7px 10px;border-left:3px solid transparent;min-width:0}
.side .tm+.tm{border-top:1px dashed var(--linea)}
.side .tm.win{border-left-color:var(--pelota);font-weight:700}
.side .tm.lose{color:var(--gris)}
.tm .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}
.match .scores{display:flex;flex-direction:column;border-left:1px solid var(--linea)}
.scores .r{display:flex;flex:1}
.scores .r+.r{border-top:1px dashed var(--linea)}
.setbox{width:30px;display:grid;place-items:center;font-family:var(--mono);font-size:14px;font-weight:600;background:#fff;position:relative}
.setbox+.setbox{border-left:1px dashed var(--linea)}
.setbox.w{background:var(--pelota)}
.setbox.tb{background-image:repeating-linear-gradient(135deg,transparent,transparent 4px,rgba(20,26,24,.06) 4px,rgba(20,26,24,.06) 5px)}
.setbox.tb::after{content:"TB";position:absolute;top:1px;right:2px;font-size:7px;font-weight:700;color:var(--gris);letter-spacing:.02em}
.lbl.tblbl{color:var(--pista);font-weight:700}
.match .pending{display:grid;place-items:center;padding:0 12px;border-left:1px solid var(--linea);
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--gris);text-transform:uppercase}
.avatar{width:26px;height:26px;border-radius:2px;object-fit:cover;background:var(--tiza);flex:none}
.avatar.ph{display:grid;place-items:center;font-family:var(--display);font-size:13px;color:var(--gris)}

/* tablas */
table{width:100%;border-collapse:collapse;font-size:14px}
th{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gris);font-weight:400;
  text-align:right;padding:6px 5px;border-bottom:1px solid var(--linea)}
th:nth-child(-n+2){text-align:left}
td{padding:8px 5px;border-bottom:1px solid var(--linea);text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
td:nth-child(2){text-align:left;font-family:var(--body)}
td:first-child{text-align:left;width:34px;color:var(--gris)}
tr.qual td{background:#FBFEE3}
tr.qual td:first-child{box-shadow:inset 3px 0 0 var(--pelota);color:var(--tinta);font-weight:600}
.tblwrap{overflow-x:auto}

/* bracket */
.bracket{display:flex;gap:26px;overflow-x:auto;padding:4px 2px 14px}
.rnd{flex:none;width:260px;display:flex;flex-direction:column;justify-content:space-around;gap:14px}
.rnd>.eyebrow{text-align:center;margin-bottom:2px}
.bye{color:var(--gris);font-style:italic}
.tbd{color:var(--gris);font-style:italic;opacity:.65}
.confirm-overlay{position:fixed;inset:0;background:rgba(20,26,24,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.confirm-box{background:var(--papel);border-radius:16px;padding:22px;max-width:360px;width:100%;box-shadow:0 20px 50px rgba(20,26,24,.3)}
.confirm-box p{margin:0 0 18px;font-family:var(--body);color:var(--tinta);line-height:1.4}
.levels{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-top:12px}
.levelcard{display:flex;gap:10px;text-align:left;padding:12px;border:1px solid var(--linea);border-radius:10px;background:var(--papel);cursor:pointer;font-family:inherit}
.levelcard:hover{border-color:var(--pista)}
.levelcard.sel{border-color:var(--pista);background:#FBFEE3;box-shadow:inset 0 0 0 1px var(--pista)}
.lvnum{flex:none;width:28px;height:28px;border-radius:50%;background:var(--tinta);color:var(--pelota);display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:13px}
.levelcard.sel .lvnum{background:var(--pista)}
.lvname{font-family:var(--display);font-weight:700;font-size:15px;margin-bottom:3px}
.lvdesc{font-size:12px;color:var(--gris);line-height:1.35}
.tabbadge{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;margin-left:6px;border-radius:9px;background:var(--falta);color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;vertical-align:middle}

const uid = () => Math.random().toString(36).slice(2, 10);
const ROUND_NAMES = { 32:"Dieciseisavos de final", 16:"Octavos de final", 8:"Cuartos de final", 4:"Semifinales", 2:"Final" };
const nextPow2 = n => { let s = 2; while (s < n) s *= 2; return s; };
const b64e = s => { const b = new TextEncoder().encode(s); let bin = ""; b.forEach(x => bin += String.fromCharCode(x));
  return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); };
const b64d = s => { const bin = atob(s.replace(/-/g,"+").replace(/_/g,"/"));
  return new TextDecoder().decode(Uint8Array.from(bin, c => c.charCodeAt(0))); };

const seedOrder = n => { let a = [1,2]; while (a.length < n) { const m = a.length*2+1, o = []; a.forEach(s => { o.push(s); o.push(m-s); }); a = o; } return a; };

/** Empareja la primera ronda: 1 vs N por siembra, byes a los mejores,
 *  y repara cruces del mismo grupo intercambiando rivales cercanos. */
function buildFirstRound(entries, size) {
  const slots = seedOrder(size).map(s => entries[s-1] || null);
  const pairs = [];
  for (let i = 0; i < size; i += 2) pairs.push([slots[i], slots[i+1]]);
  const clash = p => p[0] && p[1] && p[0].groupId && p[0].groupId === p[1].groupId;
  for (let i = 0; i < pairs.length; i++) {
    if (!clash(pairs[i])) continue;
    let done = false;
    for (let d = 1; d < pairs.length && !done; d++) {
      for (const j of [i-d, i+d]) {
        if (j < 0 || j >= pairs.length || j === i || !pairs[j][1]) continue;
        const a = [pairs[i][0], pairs[j][1]], b = [pairs[j][0], pairs[i][1]];
        if (!clash(a) && !clash(b)) { pairs[i] = a; pairs[j] = b; done = true; break; }
      }
    }
  }
  return pairs;
}

/* --- resultados --- */
const setsValid = sets => Array.isArray(sets) && sets.length > 0 &&
  sets.every(s => Number.isInteger(s.a) && Number.isInteger(s.b) && s.a >= 0 && s.b >= 0 && s.a !== s.b) &&
  sets.filter(s => s.tb).length <= 1; // como mucho un tiebreak por partido
const setsWon = sets => sets.reduce((acc, s) => (s.a > s.b ? [acc[0]+1, acc[1]] : [acc[0], acc[1]+1]), [0,0]);

const gamesOf = sets => sets.reduce((acc, s) => s.tb ? acc : [acc[0]+s.a, acc[1]+s.b], [0,0]);
const winnerSide = sets => { if (!setsValid(sets)) return null; const [a,b] = setsWon(sets); return a === b ? null : (a > b ? "a" : "b"); };

/* --- posiciones --- */
function standingsFor(teams, matches) {
  const base = {}; teams.forEach(t => base[t.id] = { teamId:t.id, played:0, wins:0, losses:0, setsFor:0, setsAgainst:0, gamesFor:0, gamesAgainst:0 });
  matches.filter(m => m.status === "completed" && m.sets?.length).forEach(m => {
    const [sa,sb] = setsWon(m.sets), [ga,gb] = gamesOf(m.sets);
    const A = base[m.teamAId], B = base[m.teamBId];
    if (!A || !B) return;
    A.played++; B.played++;
    A.setsFor+=sa; A.setsAgainst+=sb; B.setsFor+=sb; B.setsAgainst+=sa;
    A.gamesFor+=ga; A.gamesAgainst+=gb; B.gamesFor+=gb; B.gamesAgainst+=ga;
    if (m.winnerTeamId === A.teamId) { A.wins++; B.losses++; } else { B.wins++; A.losses++; }
  });
  const rows = Object.values(base).map(r => ({ ...r, diff: r.gamesFor - r.gamesAgainst }));
  rows.sort((x,y) => y.wins - x.wins || y.diff - x.diff);
  // empates: misma posición, sin desempate forzado
  let rank = 0;
  rows.forEach((r, i) => {
    const prev = rows[i-1];
    const same = prev && prev.wins === r.wins && prev.diff === r.diff;
    if (!same) rank = i + 1;
    r.rank = rank; r.tied = !!same;
    if (same) prev.tied = true;
  });
  return rows;
}

function newTournament(cfg) {
  const id = uid();
  const groups = cfg.hasGroupStage
    ? Array.from({ length: cfg.numberOfGroups }, (_, i) => ({ id: uid(), name: `Grupo ${String.fromCharCode(65+i)}`, order: i }))
    : [];
  return {
    id, name: cfg.name, date: cfg.date,
    hasGroupStage: cfg.hasGroupStage,
    numberOfTeams: cfg.numberOfTeams,
    numberOfGroups: cfg.numberOfGroups || 0,
    teamsPerGroup: cfg.teamsPerGroup || 0,
    qualifiersPerGroup: cfg.qualifiersPerGroup || 0,
    knockoutStartRound: cfg.knockoutStartRound,
    allowByes: cfg.allowByes,
    groups, teams: [], matches: [], ko: null, registrations: [],
    createdAt: Date.now(), updatedAt: Date.now(),
  };
}

function statusOf(t) {
  if (!t.teams.length) return "Configuración";
  if (t.ko) {
    const ko = deriveKO(t);
    if (ko.champion) return "Torneo finalizado";
    return ko.rounds.flat().some(m => m.result) ? "Knockouts en curso" : "Knockouts generados";
  }
  if (t.hasGroupStage) {
    const gm = t.matches.filter(m => m.phase === "group");
    if (!gm.length) return "Equipos cargados";
    if (gm.every(m => m.status === "completed")) return "Fase de grupos finalizada";
    return "Fase de grupos en curso";
  }
  return "Equipos cargados";
}

/* --- llave derivada a partir de ko.pairs + ko.results --- */
function deriveKO(t) {
  if (!t.ko) return null;
  const { size, pairs, results } = t.ko;
  const byId = Object.fromEntries(t.teams.map(x => [x.id, x]));
  const rounds = [];
  let current = pairs.map((p, i) => ({ id: `r0m${i}`, r: 0, i, a: p[0], b: p[1] }));
  const total = Math.log2(size);
  for (let r = 0; r < total; r++) {
    const ms = current.map(m => {
      const stored = results[m.id];
      const fresh = stored && stored.a === m.a && stored.b === m.b ? stored : null;
      const isBye = (!m.a && !!m.b) || (!!m.a && !m.b);
      let winner = null, result = null;
      if (isBye) winner = m.a || m.b;
      else if (m.a && m.b && fresh && setsValid(fresh.sets)) {
        const w = winnerSide(fresh.sets);
        if (w) { winner = w === "a" ? m.a : m.b; result = fresh; }
      }
      return { ...m, r, isBye, winner, result, teamA: byId[m.a] || null, teamB: byId[m.b] || null,
        roundSize: size / Math.pow(2, r), name: ROUND_NAMES[size / Math.pow(2, r)] || `Ronda de ${size/Math.pow(2,r)}` };
    });
    rounds.push(ms);
    if (r === total - 1) break;
    current = [];
    for (let i = 0; i < ms.length; i += 2)
      current.push({ id: `r${r+1}m${i/2}`, r: r+1, i: i/2, a: ms[i].winner, b: ms[i+1].winner });
  }
  const fin = rounds[rounds.length-1][0];
  return { rounds, champion: fin.winner ? byId[fin.winner] : null };
}

  const [confirmClear, setConfirmClear] = useState(false);

  const hasTb = sets.some(s => s.tb);
  let sn = 0;
  const labels = sets.map(s => s.tb ? "Tiebreak" : `Set ${++sn}`);
  const save = () => {
    const parsed = sets.filter(s => s.a !== "" || s.b !== "").map(s => ({ a: parseInt(s.a,10), b: parseInt(s.b,10), ...(s.tb ? { tb:true } : {}) }));

        </div>

function QRCanvas({ text, size = 260 }) {
  const ref = useRef(null);
  const [err, setErr] = useState("");
  useEffect(() => {
    try {
      const m = qrMatrix(text), n = m.length, q = 4, total = n + q*2;
      const scale = Math.max(2, Math.floor(size / total));
      const cv = ref.current; cv.width = cv.height = total * scale;
      const ctx = cv.getContext("2d");
      ctx.fillStyle = "#fff"; ctx.fillRect(0,0,cv.width,cv.height);
      ctx.fillStyle = "#12130F";
      for (let r = 0; r < n; r++) for (let c = 0; c < n; c++)
        if (m[r][c]) ctx.fillRect((c+q)*scale, (r+q)*scale, scale, scale);
      setErr("");
    } catch { setErr("El torneo no entra en un código QR. Usá el botón de exportar."); }
  }, [text, size]);
  return (
    <div>
      <canvas className="qr" ref={ref} style={{ width:size, maxWidth:"100%", height:"auto", display: err ? "none":"block" }} aria-label="Código QR de la vista pública" />
      {err && <div className="warn">{err}</div>}
    </div>
  );
}

/* ───────────────────────── wizard ───────────────────────── */
function Wizard({ onCreate, onCancel }) {
  const [step, setStep] = useState(0);
  const [f, setF] = useState({ name:"", date:new Date().toISOString().slice(0,10), hasGroupStage:true,
    numberOfTeams:16, numberOfGroups:4, qualifiersPerGroup:2, knockoutStartRound:8, allowByes:true });
  const set = (k,v) => setF(s => ({ ...s, [k]:v }));

  // Equipos por grupo se calcula solo: es el mínimo cupo por grupo que alcanza para todos los equipos.
  // Así no hay forma de configurar un cupo que sobredimensione los grupos (ej: 24 equipos en 8 grupos de a 5).
  const teamsPerGroup = Math.max(2, Math.ceil(f.numberOfTeams / Math.max(1, f.numberOfGroups)));
  const evenSplit = f.numberOfGroups > 0 && (f.numberOfTeams % f.numberOfGroups === 0);

  const options = useMemo(() => {
    if (!f.hasGroupStage) return [];
    const out = [];
    for (let q = 1; q <= teamsPerGroup; q++) {
      const qualifiers = q * f.numberOfGroups;
      if (qualifiers < 2) continue;
      const bracket = nextPow2(qualifiers);
      if (bracket > 32) continue;
      out.push({ q, qualifiers, bracket, byes: bracket - qualifiers });
    }
    return out;
  }, [f.hasGroupStage, teamsPerGroup, f.numberOfGroups]);

  const noGroupBracket = nextPow2(Math.max(2, f.numberOfTeams));

  const canNext = () => {
    if (step === 0) return f.name.trim().length > 0;
    if (step === 1) return true;
    if (step === 2) return f.hasGroupStage ? (f.numberOfGroups >= 1 && f.numberOfTeams >= f.numberOfGroups * 1 && f.numberOfTeams >= 2) : f.numberOfTeams >= 2;
    if (step === 3) return f.hasGroupStage ? !!f.qualifiersPerGroup : true;
    return true;
  };
  const last = f.hasGroupStage ? 3 : 2;

  return (
    <div className="card">
      <div className="eyebrow">Paso {step+1} de {last+1}</div>
      <h2 style={{ margin:"6px 0 16px" }}>
        {(f.hasGroupStage
          ? ["El torneo","Formato","Grupos y equipos","Clasificación"]
          : ["El torneo","Formato","Equipos"])[step]}
      </h2>

      {step === 0 && (
        <div className="grid2">
          <label className="f"><span>Nombre del torneo</span>
            <input className="inp" value={f.name} autoFocus placeholder="Copa de verano" onChange={e => set("name", e.target.value)} /></label>
          <label className="f"><span>Fecha</span>
            <input className="inp" type="date" value={f.date} onChange={e => set("date", e.target.value)} /></label>
        </div>
      )}

      {step === 1 && (
        <>
          <button className="opt" aria-pressed={f.hasGroupStage} onClick={() => set("hasGroupStage", true)}>
            <b>Con fase de grupos</b><div className="sub">Todos contra todos por grupo y después eliminación directa.</div>
          </button>
          <button className="opt" aria-pressed={!f.hasGroupStage} onClick={() => set("hasGroupStage", false)}>
            <b>Solo eliminación directa</b><div className="sub">Se juega la llave desde el primer partido.</div>
          </button>
        </>
      )}

      {step === 2 && f.hasGroupStage && (
        <>
          <div className="grid3">
            <label className="f"><span>Equipos</span>
              <input className="inp mono" type="number" min="2" value={f.numberOfTeams} onChange={e => set("numberOfTeams", +e.target.value)} /></label>
            <label className="f"><span>Grupos</span>
              <input className="inp mono" type="number" min="1" max="16" value={f.numberOfGroups} onChange={e => set("numberOfGroups", +e.target.value)} /></label>
            <label className="f"><span>Equipos por grupo</span>
              <input className="inp mono" type="number" value={teamsPerGroup} disabled title="Se calcula solo según equipos y grupos" /></label>
          </div>
          {evenSplit
            ? <div className="note">{f.numberOfGroups} grupos de {teamsPerGroup} equipos cada uno.</div>
            : <div className="note">{f.numberOfGroups} grupos: algunos van a tener {teamsPerGroup} equipos y otros {teamsPerGroup - 1}, para completar los {f.numberOfTeams}. Los asignás a mano en la solapa Equipos.</div>}
        </>
      )}

      {step === 2 && !f.hasGroupStage && (
        <>
          <label className="f" style={{ maxWidth:220 }}><span>Cantidad de equipos</span>
            <input className="inp mono" type="number" min="2" max="32" value={f.numberOfTeams} onChange={e => set("numberOfTeams", +e.target.value)} /></label>
          <div className="note">
            Llave de {noGroupBracket} lugares — arranca en {ROUND_NAMES[noGroupBracket] || `ronda de ${noGroupBracket}`}.
            {noGroupBracket > f.numberOfTeams && ` Se generan ${noGroupBracket - f.numberOfTeams} byes para los mejores sembrados.`}
          </div>
        </>
      )}

      {step === 3 && f.hasGroupStage && (
        <>
          <p className="sub" style={{ marginTop:0 }}>Con {f.numberOfTeams} equipos en {f.numberOfGroups} grupos podés elegir:</p>
          {options.map(o => (
            <button key={o.q} className="opt" aria-pressed={f.qualifiersPerGroup === o.q}
              onClick={() => { set("qualifiersPerGroup", o.q); set("knockoutStartRound", o.bracket); set("allowByes", o.byes > 0 ? true : f.allowByes); }}>
              <b>Pasan {o.q} por grupo → {ROUND_NAMES[o.bracket] || `ronda de ${o.bracket}`}</b>
              <div className="sub">
                {o.qualifiers} clasificados para una llave de {o.bracket}.
                {o.byes > 0 && ` Se generarán ${o.byes} byes para los mejores clasificados.`}
              </div>
            </button>
          ))}
          {!options.length && <div className="warn">Esta combinación no permite armar una llave. Volvé y ajustá grupos o equipos por grupo.</div>}
          {f.qualifiersPerGroup > 0 && f.knockoutStartRound > f.qualifiersPerGroup * f.numberOfGroups && (
            <label className="row" style={{ marginTop:10, gap:8 }}>
              <input type="checkbox" checked={f.allowByes} onChange={e => set("allowByes", e.target.checked)} />
              <span className="sub">Permitir byes en la primera ronda del knockout</span>
            </label>
          )}
        </>
      )}

      <div className="row" style={{ marginTop:20, justifyContent:"space-between" }}>
        <button className="btn ghost" onClick={() => step === 0 ? onCancel() : setStep(step-1)}>{step === 0 ? "Cancelar" : "Atrás"}</button>
        {step < last
          ? <button className="btn primary" disabled={!canNext()} onClick={() => setStep(step+1)}>Continuar</button>
          : <button className="btn ball" disabled={!canNext()} onClick={() => onCreate(newTournament({
              ...f,
              teamsPerGroup: f.hasGroupStage ? teamsPerGroup : 0,
              knockoutStartRound: f.hasGroupStage ? f.knockoutStartRound : noGroupBracket,
              numberOfGroups: f.hasGroupStage ? f.numberOfGroups : 0,
            }))}>Crear torneo</button>}
      </div>
    </div>
  );
}

// "Agustin Hernandez" -> "Agustin H". Si solo hay un nombre (sin apellido cargado), lo deja tal cual.
const shortName = full => {
  const parts = (full || "").trim().split(/\s+/).filter(Boolean);
  if (parts.length <= 1) return parts[0] || "";
  return `${parts[0]} ${parts[1][0].toUpperCase()}`;
};
const teamNameFrom = (p1, p2) => [shortName(p1), shortName(p2)].filter(Boolean).join(" | ");

function TeamsTab({ t, save, readOnly }) {
  const empty = { player1Name:"", player2Name:"", groupId: t.groups[0]?.id || null, notes:"", photoDataUrl:null };
  const [form, setForm] = useState(empty);
  const [editing, setEditing] = useState(null);
  const [err, setErr] = useState("");
  const [confirmDel, setConfirmDel] = useState(null); // { id, name }
  const fileRef = useRef(null);
  const set = (k,v) => setForm(s => ({ ...s, [k]:v }));
  const previewName = teamNameFrom(form.player1Name, form.player2Name);

  const onPhoto = file => {
    if (!file) return;
    const img = new Image(), fr = new FileReader();
    fr.onload = () => { img.onload = () => {
      const S = 240, cv = document.createElement("canvas"); cv.width = cv.height = S;
      const ctx = cv.getContext("2d"), m = Math.min(img.width, img.height);
      ctx.drawImage(img, (img.width-m)/2, (img.height-m)/2, m, m, 0, 0, S, S);
      set("photoDataUrl", cv.toDataURL("image/jpeg", 0.72));
    }; img.src = fr.result; };
    fr.readAsDataURL(file);
  };

  const submit = () => {
    if (!form.player1Name.trim() || !form.player2Name.trim()) return setErr("Cargá los dos jugadores.");
    const name = teamNameFrom(form.player1Name, form.player2Name);
    const dup = t.teams.some(x => x.name.trim().toLowerCase() === name.trim().toLowerCase() && x.id !== editing);
    if (dup) return setErr(`Ya hay un equipo que quedaría con el mismo nombre ("${name}"). Agregá el apellido completo para diferenciarlos.`);
    if (!editing && t.teams.length >= t.numberOfTeams) return setErr(`El torneo se configuró con ${t.numberOfTeams} equipos.`);
    if (t.hasGroupStage && form.groupId) {
      const inGroup = t.teams.filter(x => x.groupId === form.groupId && x.id !== editing).length;
      if (inGroup >= t.teamsPerGroup) return setErr("Ese grupo ya está completo.");
    }
    const teams = editing
      ? t.teams.map(x => x.id === editing ? { ...x, ...form, name } : x)
      : [...t.teams, { id: uid(), tournamentId: t.id, seed: t.teams.length + 1, ...form, name }];
    save({ ...t, teams });
    setForm({ ...empty, groupId: form.groupId }); setEditing(null); setErr("");
    if (fileRef.current) fileRef.current.value = "";
  };
  const remove = id => save({ ...t, teams: t.teams.filter(x => x.id !== id),
    matches: t.matches.filter(m => m.teamAId !== id && m.teamBId !== id),
    ko: t.ko && t.ko.pairs.flat().includes(id) ? null : t.ko });

  if (readOnly) return (
    <div className="card">
      <h3>Equipos</h3>
      <div className="list">{t.teams.map(x => (
        <div className="tcard" key={x.id}>
          <Avatar team={x} size={40} />
          <div style={{ flex:1, minWidth:0 }}>
            <b>{x.name}</b>
            <div className="sub">{x.player1Name} · {x.player2Name}</div>
          </div>
          {x.groupId && <span className="chip dark">{t.groups.find(g => g.id === x.groupId)?.name}</span>}
        </div>))}
      </div>
    </div>
  );

  return (
    <>
      <div className="card">
        <h3>{editing ? "Editar equipo" : "Agregar equipo"}</h3>
        <div className="grid3">
          <label className="f"><span>Jugador A</span><input className="inp" placeholder="Nombre y apellido" value={form.player1Name} onChange={e => set("player1Name", e.target.value)} /></label>
          <label className="f"><span>Jugador B</span><input className="inp" placeholder="Nombre y apellido" value={form.player2Name} onChange={e => set("player2Name", e.target.value)} /></label>
          {t.hasGroupStage && (
            <label className="f"><span>Grupo</span>
              <select className="inp" value={form.groupId || ""} onChange={e => set("groupId", e.target.value)}>
                {t.groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
              </select></label>
          )}
        </div>

        <div className="grid3">

        <div className="row">

        <h3>Plantel</h3>

          <div className="list">
            {t.teams.map(x => (

                </div>

                <button className="btn danger sm" onClick={() => setConfirmDel({ id:x.id, name:x.name })}>Eliminar</button>
              </div>
            ))}
          </div>
        )}

      <Confirm open={!!confirmDel} message={`Se elimina "${confirmDel?.name}" del torneo. ¿Deseás continuar?`}
        confirmLabel="Eliminar" onCancel={() => setConfirmDel(null)} onConfirm={() => { remove(confirmDel.id); setConfirmDel(null); }} />
    </>
  );
}

function RegistrationsTab({ t, save }) {
  const [picked, setPicked] = useState([]);
  const [copied, setCopied] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null); // { id, label }
  const regs = t.registrations || [];
  const active = regs.filter(r => r.status !== "waitlist");
  const waitlist = regs.filter(r => r.status === "waitlist");
  const paired = active.filter(r => r.mode === "pair");
  const solos = active.filter(r => r.mode === "solo");
  const activeOccupied = t.teams.length + active.length;

  const base = typeof window !== "undefined" ? window.location.href.split("#")[0] : "";
  const link = `${base}#inscribirse=${t.id}`;
  const copy = () => navigator.clipboard?.writeText(link).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1800); });

  const convert = ids => {
    const list = regs.filter(r => ids.includes(r.id));
    if (!list.length) return;
    const player1Name = list[0].player1Name;
    const player2Name = list[0].mode === "pair" ? list[0].player2Name : (list[1]?.player1Name || "");
    const name = teamNameFrom(player1Name, player2Name);
    const notes = list.map(r => `${r.player1Name}: nivel ${r.level} (${r.whatsapp})`).join(" · ");
    const team = { id: uid(), tournamentId: t.id, seed: t.teams.length + 1, player1Name, player2Name,
      groupId: t.groups[0]?.id || null, notes, photoDataUrl: null, name };
    save({ ...t, teams: [...t.teams, team], registrations: regs.filter(r => !ids.includes(r.id)) });
    setPicked([]);
  };
  const remove = id => save({ ...t, registrations: regs.filter(r => r.id !== id) });
  const promote = id => save({ ...t, registrations: regs.map(r => r.id === id ? { ...r, status:"active" } : r) });

  return (
    <div className="card">
      <h3>Inscripciones</h3>
      <p className="sub">Compartí este link para que la gente se anote sola, sin que vos tengas que cargar nada. {activeOccupied}/{t.numberOfTeams} lugares ocupados (entre equipos ya cargados e inscripciones pendientes).</p>
      <div className="row" style={{ marginTop:10 }}>
        <button className="btn primary sm" onClick={copy}>{copied ? "Link copiado" : "Copiar link de inscripción"}</button>
      </div>

      <h3 style={{ marginTop:24 }}>Parejas anotadas ({paired.length})</h3>
      {!paired.length ? <p className="sub">Todavía no hay inscripciones en pareja.</p> : (
        <div className="list">
          {paired.map(r => (
            <div className="tcard" key={r.id}>
              <div style={{ flex:1 }}>
                <b>{teamNameFrom(r.player1Name, r.player2Name)}</b>
                <div className="sub">Nivel {r.level} · {r.whatsapp}</div>
              </div>
              <button className="btn primary sm" onClick={() => convert([r.id])}>Convertir en equipo</button>
              <button className="btn ghost sm" onClick={() => setConfirmDel({ id:r.id, label:teamNameFrom(r.player1Name, r.player2Name) })}>Borrar</button>
            </div>
          ))}
        </div>
      )}

      <h3 style={{ marginTop:24 }}>Buscan compañero/a ({solos.length})</h3>
      {!solos.length ? <p className="sub">Nadie anotado como solo por ahora.</p> : (
        <>
          <p className="sub">Marcá dos para emparejarlos en un mismo equipo.</p>
          <div className="list">
            {solos.map(r => (
              <div className="tcard" key={r.id}>
                <label className="row" style={{ flex:1, cursor:"pointer" }}>
                  <input type="checkbox" checked={picked.includes(r.id)}
                    onChange={e => setPicked(p => e.target.checked ? [...p, r.id] : p.filter(x => x !== r.id))} />
                  <div><b>{r.player1Name}</b><div className="sub">Nivel {r.level} · {r.whatsapp}</div></div>
                </label>
                <button className="btn ghost sm" onClick={() => setConfirmDel({ id:r.id, label:r.player1Name })}>Borrar</button>
              </div>
            ))}
          </div>
          <button className="btn primary sm" style={{ marginTop:10 }} disabled={picked.length !== 2} onClick={() => convert(picked)}>
            Emparejar y crear equipo ({picked.length}/2)
          </button>
        </>
      )}

      <h3 style={{ marginTop:24 }}>Lista de espera ({waitlist.length})</h3>
      {!waitlist.length ? <p className="sub">Nadie en lista de espera.</p> : (
        <div className="list">
          {waitlist.map(r => (
            <div className="tcard" key={r.id}>
              <div style={{ flex:1 }}>
                <b>{r.mode === "pair" ? teamNameFrom(r.player1Name, r.player2Name) : r.player1Name}</b>
                <div className="sub">{r.mode === "pair" ? "Pareja" : "Busca compañero/a"} · Nivel {r.level} · {r.whatsapp}</div>
              </div>
              <button className="btn primary sm" onClick={() => promote(r.id)}>Pasar a inscriptos</button>
              <button className="btn ghost sm" onClick={() => setConfirmDel({ id:r.id, label:r.player1Name })}>Borrar</button>
            </div>
          ))}
        </div>
      )}
      <Confirm open={!!confirmDel} message={`Se borra la inscripción de "${confirmDel?.label}". ¿Deseás continuar?`}
        confirmLabel="Borrar" onCancel={() => setConfirmDel(null)} onConfirm={() => { remove(confirmDel.id); setConfirmDel(null); }} />
    </div>
  );
}

function GroupsTab({ t, save, readOnly }) {
  const [open, setOpen] = useState(null);
  const [confirmRegen, setConfirmRegen] = useState(false);
  const byId = Object.fromEntries(t.teams.map(x => [x.id, x]));
  const groupMatches = t.matches.filter(m => m.phase === "group");
  const unassigned = t.teams.filter(x => !x.groupId);

  const generate = () => {
    const ms = [];
    t.groups.forEach(g => {
      const list = t.teams.filter(x => x.groupId === g.id);
      for (let i = 0; i < list.length; i++) for (let j = i+1; j < list.length; j++)
        ms.push({ id: uid(), tournamentId: t.id, phase:"group", groupId: g.id, teamAId: list[i].id, teamBId: list[j].id, sets: [], winnerTeamId: null, status: "pending" });
    });
    save({ ...t, matches: ms, ko: null });
  };

  const saveResult = (id, sets, w) => {
    const m = t.matches.find(x => x.id === id);
    save({ ...t, matches: t.matches.map(x => x.id === id ? { ...x, sets, winnerTeamId: w === "a" ? m.teamAId : m.teamBId, status:"completed" } : x) });
    setOpen(null);
  };
  const clearResult = id => { save({ ...t, matches: t.matches.map(x => x.id === id ? { ...x, sets: [], winnerTeamId: null, status:"pending" } : x) }); setOpen(null); };

  if (!t.hasGroupStage) return <div className="card"><div className="empty"><h3>Este torneo no tiene fase de grupos</h3><p className="sub">Andá a Knockouts para armar la llave.</p></div></div>;

  return (
    <>
      {!readOnly && !groupMatches.length && (
        <div className="card">
          <h3>Generar partidos</h3>
          <p className="sub">Cada grupo juega todos contra todos.</p>
          {unassigned.length > 0 && <div className="warn">Faltan asignar a un grupo: {unassigned.map(x => x.name).join(", ")}.</div>}
          {t.teams.length < 2 && <div className="warn">Cargá al menos dos equipos.</div>}
          <button className="btn ball" disabled={!!unassigned.length || t.teams.length < 2} onClick={generate}>Generar partidos de grupos</button>
        </div>
      )}
      {!readOnly && groupMatches.length > 0 && (
        <div className="row" style={{ marginTop:16, justifyContent:"flex-end" }}>
          <button className="btn ghost sm" onClick={() => setConfirmRegen(true)}>Regenerar partidos</button>
        </div>
      )}
      <Confirm open={confirmRegen} message="Esto borra todos los partidos y resultados de grupos. ¿Deseás continuar?"
        confirmLabel="Regenerar" onCancel={() => setConfirmRegen(false)} onConfirm={() => { generate(); setConfirmRegen(false); }} />

      <div className="groupgrid" style={{ marginTop:16 }}>
        {t.groups.map(g => {
          const teams = t.teams.filter(x => x.groupId === g.id);
          const ms = groupMatches.filter(m => m.groupId === g.id);
          const rows = standingsFor(teams, ms);
          const cut = t.qualifiersPerGroup;
          return (
            <div className="card" key={g.id} style={{ marginTop:0 }}>
              <div className="row" style={{ justifyContent:"space-between" }}>
                <h3>{g.name}</h3>
                <span className="eyebrow">{ms.filter(m => m.status==="completed").length}/{ms.length} jugados</span>
              </div>
              {!ms.length && <p className="sub">{teams.length} equipos, sin partidos generados.</p>}
              {ms.map(m => (
                <Scoreboard key={m.id} teamA={byId[m.teamAId]} teamB={byId[m.teamBId]} sets={m.sets}
                  winnerId={m.winnerTeamId} disabled={readOnly} onClick={() => setOpen(m)} />
              ))}
              {rows.some(r => r.played) && (
                <div className="tblwrap" style={{ marginTop:12 }}>
                  <table>
                    <thead><tr><th>#</th><th>Equipo</th><th>PG</th><th>PP</th><th>GF</th><th>GC</th><th>DIF</th></tr></thead>
                    <tbody>{rows.map(r => (
                      <tr key={r.teamId} className={cut && r.rank <= cut ? "qual" : ""}>
                        <td>{r.rank}{r.tied ? "=" : ""}</td>
                        <td><div className="row" style={{ gap:8, alignItems:"center" }}><Avatar team={byId[r.teamId]} size={24} />{byId[r.teamId]?.name}</div></td>
                        <td>{r.wins}</td><td>{r.losses}</td>
                        <td>{r.gamesFor}</td><td>{r.gamesAgainst}</td>
                        <td>{r.diff > 0 ? `+${r.diff}` : r.diff}</td>
                      </tr>))}</tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {open && <ResultModal match={open} teamA={byId[open.teamAId]} teamB={byId[open.teamBId]}
        onSave={(s,w) => saveResult(open.id, s, w)} onClear={() => clearResult(open.id)} onClose={() => setOpen(null)} />}
    </>
  );
}

function StandingsTab({ t }) {
  const byId = Object.fromEntries(t.teams.map(x => [x.id, x]));
  if (!t.hasGroupStage) return <div className="card"><div className="empty"><h3>Sin fase de grupos</h3><p className="sub">Las posiciones aplican solo a torneos con grupos.</p></div></div>;
  return (
    <div className="groupgrid" style={{ marginTop:16 }}>
      {t.groups.map(g => {
        const teams = t.teams.filter(x => x.groupId === g.id);
        const groupMatches = t.matches.filter(m => m.phase === "group" && m.groupId === g.id);
        const groupDone = groupMatches.length > 0 && groupMatches.every(m => m.status === "completed");
        const rows = standingsFor(teams, groupMatches);
        const tiedAtCut = groupDone && t.qualifiersPerGroup && rows[t.qualifiersPerGroup-1] && rows[t.qualifiersPerGroup] &&
          rows[t.qualifiersPerGroup-1].rank === rows[t.qualifiersPerGroup].rank;
        return (
          <div className="card" key={g.id} style={{ marginTop:0 }}>
            <h3>{g.name}</h3>
            {!rows.length ? <p className="sub">Sin equipos.</p> : (
              <div className="tblwrap">
                <table>
                  <thead><tr><th>#</th><th>Equipo</th><th>PG</th><th>PP</th><th>GF</th><th>GC</th><th>DIF</th></tr></thead>
                  <tbody>{rows.map(r => (
                    <tr key={r.teamId} className={t.qualifiersPerGroup && r.rank <= t.qualifiersPerGroup ? "qual" : ""}>
                      <td>{r.rank}{r.tied ? "=" : ""}</td>
                      <td><div className="row" style={{ gap:8, alignItems:"center" }}><Avatar team={byId[r.teamId]} size={24} />{byId[r.teamId]?.name}</div></td>
                      <td>{r.wins}</td><td>{r.losses}</td>
                      <td>{r.gamesFor}</td><td>{r.gamesAgainst}</td>
                      <td>{r.diff > 0 ? `+${r.diff}` : r.diff}</td>
                    </tr>))}</tbody>
                </table>
              </div>
            )}
            {tiedAtCut && <div className="warn">Hay un empate justo en el corte de clasificación. Ordenalos a mano antes de generar los knockouts.</div>}
          </div>
        );
      })}
    </div>
  );
}

function KnockoutTab({ t, save, readOnly }) {
  const [open, setOpen] = useState(null);
  const [editCross, setEditCross] = useState(false);
  const [confirmRegen, setConfirmRegen] = useState(false);
  const byId = Object.fromEntries(t.teams.map(x => [x.id, x]));
  const groupMatches = t.matches.filter(m => m.phase === "group");
  const groupsDone = t.hasGroupStage && groupMatches.length > 0 && groupMatches.every(m => m.status === "completed");

  /* ranking global de clasificados */
  const ranked = useMemo(() => {
    if (t.hasGroupStage) {
      const all = [];
      t.groups.forEach(g => {
        const teams = t.teams.filter(x => x.groupId === g.id);
        standingsFor(teams, groupMatches.filter(m => m.groupId === g.id))
          .slice(0, t.qualifiersPerGroup)
          .forEach(r => all.push({ id:r.teamId, groupId:g.id, groupName:g.name, groupRank:r.rank, wins:r.wins, diff:r.diff, gamesFor:r.gamesFor }));
      });
      all.sort((a,b) => a.groupRank - b.groupRank || b.wins - a.wins || b.diff - a.diff || b.gamesFor - a.gamesFor);
      return all;
    }
    return [...t.teams].sort((a,b) => (a.seed||0) - (b.seed||0)).map(x => ({ id:x.id, groupId:null, groupRank:null }));
  }, [t, groupMatches]);

  const [order, setOrder] = useState(null);
  const list = order || ranked;
  const move = (i, d) => { const l = [...list], j = i+d; if (j < 0 || j >= l.length) return; [l[i], l[j]] = [l[j], l[i]]; setOrder(l); };

  const bracketSize = t.hasGroupStage ? t.knockoutStartRound : nextPow2(Math.max(2, t.teams.length));
  const byes = bracketSize - list.length;

  const generate = () => {
    const pairs = buildFirstRound(list, bracketSize).map(p => [p[0]?.id || null, p[1]?.id || null]);
    save({ ...t, ko: { size: bracketSize, pairs, results: {} } });
    setOrder(null);
  };
  const shuffle = () => { const l = [...list]; for (let i = l.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [l[i],l[j]] = [l[j],l[i]]; } setOrder(l); };

  const ko = t.ko ? deriveKO(t) : null;

  const saveResult = (m, sets) => {
    save({ ...t, ko: { ...t.ko, results: { ...t.ko.results, [m.id]: { a:m.a, b:m.b, sets } } } });
    setOpen(null);
  };
  const clearResult = m => { const r = { ...t.ko.results }; delete r[m.id]; save({ ...t, ko: { ...t.ko, results: r } }); setOpen(null); };

  const swapSlot = (pi, si, teamId) => {
    if (!teamId) return; // no se puede vaciar un lugar ocupado; los byes los define la llave
    const pairs = t.ko.pairs.map(p => [...p]);
    const target = teamId;
    let fi = -1, fj = -1;
    pairs.forEach((p,i) => p.forEach((x,j) => { if (x && x === target) { fi = i; fj = j; } }));
    const old = pairs[pi][si];
    pairs[pi][si] = target;
    if (fi >= 0) pairs[fi][fj] = old;
    save({ ...t, ko: { ...t.ko, pairs } });
  };

  if (!t.ko) {
    if (readOnly) return <div className="card"><div className="empty"><h3>La llave todavía no se sorteó</h3></div></div>;
    if (t.hasGroupStage && !groupsDone) return (
      <div className="card"><div className="empty">
        <h3>Falta terminar la fase de grupos</h3>
        <p className="sub">{groupMatches.filter(m=>m.status==="completed").length} de {groupMatches.length} partidos con resultado.</p>
      </div></div>
    );
    if (!t.hasGroupStage && t.teams.length < 2) return <div className="card"><div className="empty"><h3>Cargá los equipos primero</h3></div></div>;
    return (
      <div className="card">
        <h3>Clasificados</h3>
        <p className="sub">
          {list.length} equipos para una llave de {bracketSize} ({ROUND_NAMES[bracketSize]}).
          {byes > 0 && ` Se generarán ${byes} byes para los mejores clasificados.`}
        </p>
        {byes > 0 && !t.allowByes && <div className="warn">Este torneo se configuró sin byes, pero la llave los necesita. Se van a generar igual.</div>}
        {!t.hasGroupStage && <div className="row" style={{ marginBottom:12 }}><button className="btn ghost sm" onClick={shuffle}>Sortear orden</button><span className="sub">o reordená a mano con las flechas</span></div>}
        <div className="list">
          {list.map((r,i) => (
            <div className="tcard" key={r.id}>
              <span className="mono" style={{ width:24, color:"var(--gris)" }}>{i+1}</span>
              <Avatar team={byId[r.id]} size={32} />
              <div style={{ flex:1, minWidth:0 }}>
                <b>{byId[r.id]?.name}</b>
                {r.groupName && <div className="sub">{r.groupName} · {r.groupRank}º · {r.wins} PG · DIF {r.diff > 0 ? `+${r.diff}` : r.diff}</div>}
              </div>
              {i < byes && <span className="chip">Bye</span>}
              <button className="btn ghost sm" onClick={() => move(i,-1)} disabled={i===0} aria-label="Subir">↑</button>
              <button className="btn ghost sm" onClick={() => move(i,1)} disabled={i===list.length-1} aria-label="Bajar">↓</button>
            </div>
          ))}
        </div>
        <div className="row" style={{ marginTop:16 }}>
          <button className="btn ball" onClick={generate}>Generar knockouts</button>
          {order && <button className="btn ghost" onClick={() => setOrder(null)}>Volver al orden sugerido</button>}
        </div>
      </div>
    );
  }

  return (
    <>
      {!readOnly && (
        <div className="row" style={{ marginTop:16, justifyContent:"flex-end" }}>
          <button className="btn ghost sm" onClick={() => setEditCross(v => !v)}>{editCross ? "Listo" : "Editar cruces"}</button>
          <button className="btn danger sm" onClick={() => setConfirmRegen(true)}>Regenerar llave</button>
        </div>
      )}
      <Confirm open={confirmRegen} message="Esto borra los cruces y resultados del knockout. ¿Deseás continuar?"
        confirmLabel="Regenerar" onCancel={() => setConfirmRegen(false)}
        onConfirm={() => { save({ ...t, ko: null }); setConfirmRegen(false); }} />
      {ko.champion && (
        <div className="champion">
          <div className="eyebrow" style={{ color:"rgba(255,255,255,.6)" }}>Campeón</div>
          <div style={{ marginTop:10 }}><span className="nm2">{ko.champion.name}</span></div>
          <div className="sub" style={{ color:"rgba(255,255,255,.75)", marginTop:10 }}>{ko.champion.player1Name} · {ko.champion.player2Name}</div>
        </div>
      )}
      <div className="card">
        <div className="bracket">
          {ko.rounds.map((ms, ri) => (
            <div className="rnd" key={ri}>
              <div className="eyebrow">{ms[0].name}</div>
              {ms.map((m, mi) => (
                editCross && ri === 0 ? (
                  <div key={m.id} style={{ display:"grid", gap:4 }}>
                    {[0,1].map(si => (
                      <select key={si} className="inp" value={m[si===0?"a":"b"] || ""} onChange={e => swapSlot(mi, si, e.target.value)}>
                        <option value="" disabled>— BYE —</option>
                        {t.teams.map(x => <option key={x.id} value={x.id}>{x.name}</option>)}
                      </select>
                    ))}
                  </div>
                ) : (
                  <Scoreboard key={m.id} teamA={m.teamA} teamB={m.teamB} sets={m.result?.sets} isBye={m.isBye}
                    winnerId={m.winner} disabled={readOnly || m.isBye || !m.a || !m.b}
                    onClick={() => setOpen(m)} />
                )
              ))}
            </div>
          ))}
        </div>
      </div>
      {open && <ResultModal match={{ sets: open.result?.sets || [] }} teamA={open.teamA} teamB={open.teamB}
        onSave={sets => saveResult(open, sets)} onClear={() => clearResult(open)} onClose={() => setOpen(null)} />}
    </>
  );
}

/* --- payload público comprimido (sin fotos) --- */
function toPublic(t) {
  const gi = Object.fromEntries(t.groups.map((g,i) => [g.id, i]));
  const ti = Object.fromEntries(t.teams.map((x,i) => [x.id, i]));
  return {
    n: t.name, d: t.date, g: t.groups.map(g => g.name),
    q: t.qualifiersPerGroup, h: t.hasGroupStage ? 1 : 0,
    t: t.teams.map(x => [x.name, x.player1Name, x.player2Name, x.groupId != null ? gi[x.groupId] : -1]),
    m: t.matches.filter(m => m.phase === "group").map(m => [gi[m.groupId], ti[m.teamAId], ti[m.teamBId], (m.sets||[]).map(s => [s.a, s.b, s.tb?1:0])]),
    k: t.ko ? { s: t.ko.size, p: t.ko.pairs.map(p => p.map(x => x == null ? -1 : ti[x])),
      r: Object.entries(t.ko.results).map(([id,v]) => [id, v.a==null?-1:ti[v.a], v.b==null?-1:ti[v.b], v.sets.map(s => [s.a, s.b, s.tb?1:0])]) } : null,
  };
}
function fromPublic(p) {
  const groups = (p.g || []).map((n,i) => ({ id:`g${i}`, name:n, order:i }));
  const teams = p.t.map((x,i) => ({ id:`t${i}`, name:x[0], player1Name:x[1], player2Name:x[2], groupId: x[3] >= 0 ? `g${x[3]}` : null, seed:i+1 }));
  const matches = (p.m || []).map((m,i) => {
    const sets = m[3].map(s => ({ a:s[0], b:s[1], ...(s[2] ? { tb:true } : {}) }));
    const w = winnerSide(sets);
    return { id:`m${i}`, phase:"group", groupId:`g${m[0]}`, teamAId:`t${m[1]}`, teamBId:`t${m[2]}`, sets,
      winnerTeamId: w ? (w === "a" ? `t${m[1]}` : `t${m[2]}`) : null, status: w ? "completed" : "pending" };
  });
  const ko = p.k ? { size:p.k.s, pairs:p.k.p.map(pr => pr.map(x => x < 0 ? null : `t${x}`)),
    results: Object.fromEntries(p.k.r.map(r => [r[0], { a:r[1]<0?null:`t${r[1]}`, b:r[2]<0?null:`t${r[2]}`, sets:r[3].map(s => ({a:s[0],b:s[1], ...(s[2]?{tb:true}:{})})) }])) } : null;
  return { id:"public", name:p.n, date:p.d, hasGroupStage:!!p.h, numberOfTeams:teams.length,
    numberOfGroups:groups.length, teamsPerGroup:0, qualifiersPerGroup:p.q||0,
    knockoutStartRound: ko?.size || 0, allowByes:true, groups, teams, matches, ko };
}

function PublicTab({ t }) {
  const [copied, setCopied] = useState(false);
  const cvRef = useRef(null);
  const payload = useMemo(() => b64e(JSON.stringify(toPublic(t))), [t]);
  const base = typeof window !== "undefined" ? window.location.href.split("#")[0] : "";
  const link = `${base}#t=${payload}`;
  const bytes = new TextEncoder().encode(link).length;
  const tooBig = bytes > QR_MAX;

  const download = () => {
    const cv = cvRef.current?.querySelector("canvas");
    if (!cv) return;
    const a = document.createElement("a");
    a.href = cv.toDataURL("image/png");
    a.download = `qr-${t.name.replace(/\s+/g,"-").toLowerCase()}.png`;
    a.click();
  };
  const copy = () => { navigator.clipboard?.writeText(link).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1800); }); };

  return (
    <div className="card">
      <h3>Vista pública</h3>
      <p className="sub">El link lleva el torneo entero adentro: quien lo abre ve resultados, tablas y llave, sin poder editar nada. Las fotos no viajan en el link.</p>
      <div className="row" style={{ alignItems:"flex-start", gap:24, marginTop:16 }}>
        <div ref={cvRef}>{!tooBig && <QRCanvas text={link} />}</div>
        <div style={{ flex:1, minWidth:240 }}>
          {tooBig
            ? <div className="warn">Este torneo pesa {bytes} bytes y no entra en un código QR (el máximo es {QR_MAX}). Exportá el JSON desde Configuración y compartilo así.</div>
            : <div className="note">Peso del link: {bytes} de {QR_MAX} bytes.</div>}
          <div className="row" style={{ marginTop:12 }}>
            <button className="btn primary" onClick={copy}>{copied ? "Link copiado" : "Copiar link público"}</button>
            <button className="btn ghost" disabled={tooBig} onClick={download}>Descargar QR</button>
          </div>
          <p className="sub" style={{ marginTop:14 }}>
            El link es una foto del torneo en este momento. Si cargás más resultados, generá el QR de nuevo.
            Para que se actualice solo en el celular de todos, hace falta la base de datos online de la versión 2.
          </p>
        </div>
      </div>
    </div>
  );
}

/* ───────────────────────── puerta de acceso ───────────────────────── */
function Gate({ onUnlock }) {
  const [v, setV] = useState("");
  const [err, setErr] = useState(false);
  const submit = () => {
    if (v.trim().toLowerCase() === VIEW_PASSWORD.trim().toLowerCase()) { viewAuth.set(); onUnlock(); }
    else setErr(true);
  };
  return (
    <div className="pista-app" style={{ minHeight:"100vh", display:"grid", placeItems:"center" }}>
      <style>{CSS}</style>
      <div style={{ textAlign:"center", padding:24, width:"100%", maxWidth:360 }}>
        <img src={LOGO_MOODPADEL} alt="MoodPadel" style={{ height:56, margin:"0 auto 28px", display:"block" }} />
        <div className="card">
          <p className="sub">Palabra secreta</p>
          <input className="inp" type="password" value={v}
            onChange={e => { setV(e.target.value); setErr(false); }}
            onKeyDown={e => e.key === "Enter" && submit()}
            autoFocus placeholder="…" style={{ textAlign:"center" }} />
          {err && <div className="warn">Esa no es. Probá de nuevo.</div>}
          <button className="btn ball" style={{ marginTop:14, width:"100%" }} onClick={submit}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

/* ───────────────────────── inscripción pública ───────────────────────── */
function RegisterView({ id }) {
  const [t, setT] = useState(null);
  const [loading, setLoading] = useState(true);
  const [mode, setMode] = useState("pair"); // "pair" | "solo"
  const [p1, setP1] = useState("");
  const [p2, setP2] = useState("");
  const [level, setLevel] = useState(null);
  const [whatsapp, setWhatsapp] = useState("");
  const [err, setErr] = useState("");
  const [sending, setSending] = useState(false);
  const [done, setDone] = useState(false);
  const [waitlisted, setWaitlisted] = useState(false);

  useEffect(() => { (async () => { setT(await store.get(KEY(id))); setLoading(false); })(); }, [id]);

  const shell = children => (
    <div className="pista-app">
      <style>{CSS}</style>
      <div className="topbar"><div className="wrap"><div className="topline">
        <div><div className="meta">Inscripción</div><h1>{t ? t.name : "MoodPadel"}</h1></div>
      </div></div></div>
      <div className="wrap"><div className="card">{children}</div></div>
    </div>
  );

  if (loading) return shell(<p className="sub">Cargando…</p>);
  if (!t) return shell(<><h3>No encontramos este torneo</h3><p className="sub">Puede que el link esté mal, o que el torneo se haya borrado.</p></>);

  const regs = t.registrations || [];
  const activeOccupied = t.teams.length + regs.filter(r => r.status !== "waitlist").length;
  const full = activeOccupied >= t.numberOfTeams;

  if (done) return shell(waitlisted
    ? <><h3>Quedaste en la lista de espera</h3><p className="sub">El torneo ya tiene el cupo completo. Si se libera un lugar te avisamos por WhatsApp.</p></>
    : <><h3>¡Listo, quedaste anotado/a!</h3><p className="sub">Te contactamos por WhatsApp para confirmarte los detalles.</p></>);

  const submit = async () => {
    if (!p1.trim()) return setErr("Falta tu nombre.");
    if (mode === "pair" && !p2.trim()) return setErr("Falta el nombre de tu compañero/a.");
    if (!level) return setErr("Elegí tu nivel.");
    if (!whatsapp.trim()) return setErr("Falta tu WhatsApp.");
    setSending(true); setErr("");
    const reg = { id: uid(), mode, player1Name:p1.trim(), player2Name: mode==="pair" ? p2.trim() : "", level, whatsapp:whatsapp.trim(), createdAt: Date.now() };
    try {
      const res = await fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" }, // evita el preflight CORS de Apps Script
        body: JSON.stringify({ action:"register", key: KEY(id), registration: reg }),
      });
      const j = await res.json();
      setSending(false);
      if (!j || j.error) return setErr("No se pudo enviar. Probá de nuevo en un rato.");
      setWaitlisted(j.status === "waitlist");
      setDone(true);
    } catch {
      setSending(false);
      setErr("No se pudo enviar. Probá de nuevo en un rato.");
    }
  };

  return shell(
    <>
      <h3>Anotate a {t.name}</h3>
      <p className="sub">{t.date} · {full ? "cupo completo" : `${t.numberOfTeams - activeOccupied} lugares libres de ${t.numberOfTeams}`}</p>
      {full && <div className="note">El cupo ya se completó, pero podés anotarte en la <b>lista de espera</b> — te avisamos por WhatsApp si se libera un lugar.</div>}
      <div className="row" style={{ marginTop:12 }}>
        <button type="button" className={`btn ${mode==="pair" ? "primary" : "ghost"} sm`} onClick={() => setMode("pair")}>Tengo compañero/a</button>
        <button type="button" className={`btn ${mode==="solo" ? "primary" : "ghost"} sm`} onClick={() => setMode("solo")}>Busco compañero/a</button>
      </div>
      <div className="grid3" style={{ marginTop:14 }}>
        <label className="f"><span>Tu nombre</span><input className="inp" value={p1} onChange={e => setP1(e.target.value)} placeholder="Nombre y apellido" /></label>
        {mode === "pair" && <label className="f"><span>Compañero/a</span><input className="inp" value={p2} onChange={e => setP2(e.target.value)} placeholder="Nombre y apellido" /></label>}
        <label className="f"><span>Tu WhatsApp</span><input className="inp" value={whatsapp} onChange={e => setWhatsapp(e.target.value)} placeholder="+41 78 ..." /></label>
      </div>
      <h3 style={{ marginTop:24 }}>Tu nivel</h3>
      <p className="sub">Escala de Padel Connect. Elegí el que más se parezca a tu juego — no hace falta ser exacto.</p>
      <LevelPicker value={level} onChange={setLevel} />
      {err && <div className="warn">{err}</div>}
      <button className="btn ball" style={{ marginTop:18 }} disabled={sending} onClick={submit}>{sending ? "Enviando…" : full ? "Anotarme en lista de espera" : "Anotarme"}</button>
    </>
  );
}

/* ───────────────────────── vista pública read-only ───────────────────────── */
function ReadOnlyView({ t, onExit }) {
  const TABS = ["Equipos", "Grupos", "Posiciones", "Knockouts"].filter(x => t.hasGroupStage || (x !== "Grupos" && x !== "Posiciones"));
  const [tab, setTab] = useState(TABS[t.hasGroupStage ? 1 : 0]);
  const ko = t.ko ? deriveKO(t) : null;
  return (
    <div className="pista-app">
      <style>{CSS}</style>
      <div className="topbar">
        <div className="wrap">
          <div className="topline">
            <div>
              <div className="meta">Vista pública · solo lectura</div>
              <h1>{t.name}</h1>
            </div>
            <div className="row">
              {ko?.champion && <span className="chip">Campeón: {ko.champion.name}</span>}
              <span className="chip ghost">{t.date}</span>
            </div>
          </div>
          <div className="tabs" role="tablist">
            {TABS.map(x => <button key={x} role="tab" aria-selected={tab===x} className="tab" onClick={() => setTab(x)}>{x}</button>)}
          </div>
        </div>
      </div>
      <div className="wrap">
        {tab === "Equipos" && <TeamsTab t={t} save={()=>{}} readOnly />}
        {tab === "Grupos" && <GroupsTab t={t} save={()=>{}} readOnly />}
        {tab === "Posiciones" && <StandingsTab t={t} />}
        {tab === "Knockouts" && <KnockoutTab t={t} save={()=>{}} readOnly />}
        <div className="row" style={{ marginTop:24, justifyContent:"center" }}>
          <button className="btn ghost sm" onClick={onExit}>Salir de la vista pública</button>
        </div>
      </div>
    </div>
  );
}

/* ───────────────────────── app ───────────────────────── */
function App() {
  const [publicT, setPublicT] = useState(null);
  const [registerId, setRegisterId] = useState(null);
  const [unlocked, setUnlocked] = useState(() => viewAuth.get());
  const [index, setIndex] = useState([]);
  const [t, setT] = useState(null);
  const [tab, setTab] = useState("Grupos");
  const [wizard, setWizard] = useState(false);
  const [saved, setSaved] = useState("");
  const [loading, setLoading] = useState(true);
  const [pendingDelete, setPendingDelete] = useState(null); // { id, name }
  const [importError, setImportError] = useState("");
  const [secretModal, setSecretModal] = useState(false);
  const [saveError, setSaveError] = useState("");
  const [seenAt, setSeenAt] = useState(0);
  const fileRef = useRef(null);

  useEffect(() => {
    const h = window.location.hash;
    if (h.startsWith("#t=")) {
      try { setPublicT(fromPublic(JSON.parse(b64d(h.slice(3))))); setLoading(false); return; } catch {}
    }
    if (h.startsWith("#inscribirse=")) { setRegisterId(decodeURIComponent(h.slice(13))); setLoading(false); return; }
    (async () => { if (store.ok()) setIndex(await store.get(IDX, [])); setLoading(false); })();
  }, []);

  useEffect(() => {
    if (!t) return;
    try { setSeenAt(Number(localStorage.getItem(`pista:seen:${t.id}`)) || 0); } catch { setSeenAt(0); }
  }, [t?.id]);

  const persist = useCallback(async next => {
    if (!store.ok()) return;
    setSaved("Guardando…"); setSaveError("");
    const r1 = await store.set(KEY(next.id), next);
    if (r1 && r1.error) { setSaved(""); setSaveError(r1.error); setSecretModal(true); return; }
    const idx = await store.get(IDX, []);
    const rest = idx.filter(x => x.id !== next.id);
    const ni = [{ id: next.id, name: next.name, date: next.date, updatedAt: next.updatedAt }, ...rest];
    const r2 = await store.set(IDX, ni);
    if (r2 && r2.error) { setSaved(""); setSaveError(r2.error); setSecretModal(true); return; }
    setIndex(ni);
    setSaved("Guardado"); setTimeout(() => setSaved(""), 1200);
  }, []);

  const save = next => { const n = { ...next, updatedAt: Date.now() }; setT(n); persist(n); };

  const openT = async id => { const x = await store.get(KEY(id)); if (x) { setT(x); setTab(x.hasGroupStage ? "Grupos" : "Knockouts"); } };
  const requestDelete = (id, name) => setPendingDelete({ id, name });
  const confirmDelete = async () => {
    const id = pendingDelete.id; setPendingDelete(null);
    const r1 = await store.del(KEY(id));
    if (r1 && r1.error) { setSaveError(r1.error); setSecretModal(true); return; }
    const ni = index.filter(x => x.id !== id);
    const r2 = await store.set(IDX, ni);
    if (r2 && r2.error) { setSaveError(r2.error); setSecretModal(true); return; }
    setIndex(ni);
    if (t?.id === id) setT(null);
  };
  const dupT = async id => { const x = await store.get(KEY(id)); if (!x) return;
    const c = { ...x, id: uid(), name: `${x.name} (copia)`, createdAt: Date.now(), updatedAt: Date.now() }; await persist(c); };
  const exportT = () => {
    const blob = new Blob([JSON.stringify(t, null, 2)], { type:"application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `${t.name.replace(/\s+/g,"-").toLowerCase()}.json`; a.click(); URL.revokeObjectURL(a.href);
  };
  const importT = file => { const fr = new FileReader();
    fr.onload = () => { try { const x = JSON.parse(fr.result); x.id = uid(); setImportError(""); save(x); setTab(x.hasGroupStage ? "Grupos" : "Knockouts"); }
      catch { setImportError("Ese archivo no es un torneo válido."); } }; fr.readAsText(file); };

  if (publicT) return <ReadOnlyView t={publicT} onExit={() => { window.location.hash = ""; setPublicT(null); }} />;
  if (registerId) return <RegisterView id={registerId} />;
  if (!unlocked) return <Gate onUnlock={() => setUnlocked(true)} />;

  const TABS = ["Configuración","Equipos","Inscripciones","Grupos","Posiciones","Knockouts","Vista pública"];

  return (
    <div className="pista-app">
      <style>{CSS}</style>
      <div className="topbar">
        <div className="wrap">
          <div className="topline">
            <div>
              <div className="meta">Gestor de torneos</div>
              {t ? <h1>{t.name}</h1> : <img src={LOGO_MOODPADEL} alt="MoodPadel" className="brand-logo" />}
            </div>
            <div className="row">
              {t && <span className="chip">{statusOf(t)}</span>}
              {t && <span className="chip ghost">{t.date}</span>}
              {saved && <span className="saveflag">{saved}</span>}
              {saveError && <span className="chip ghost" style={{ borderColor:"var(--falta)", color:"var(--falta)" }}>
                No se guardó: {saveError === "no autorizado" ? "clave incorrecta" : "error de conexión"}
              </span>}
              {store.ok() && <button className="btn ghost sm" style={{ color:"#fff", borderColor:"rgba(255,255,255,.3)" }} onClick={() => setSecretModal(true)}>🔑 Clave</button>}
              {t && <button className="btn ghost sm" style={{ color:"#fff", borderColor:"rgba(255,255,255,.3)" }} onClick={() => setT(null)}>Mis torneos</button>}
            </div>
          </div>
          {t && (
            <div className="tabs" role="tablist">
              {TABS.map(x => {
                const newRegs = x === "Inscripciones" ? (t.registrations||[]).filter(r => r.createdAt > seenAt).length : 0;
                return (
                  <button key={x} role="tab" aria-selected={tab===x} className="tab"
                    disabled={(x==="Grupos"||x==="Posiciones") && !t.hasGroupStage}
                    onClick={() => {
                      setTab(x);
                      if (x === "Inscripciones") { const now = Date.now(); try { localStorage.setItem(`pista:seen:${t.id}`, String(now)); } catch {} setSeenAt(now); }
                    }}>
                    {x}{newRegs > 0 && <span className="tabbadge">{newRegs}</span>}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </div>

      <div className="wrap">
        {loading && <div className="card"><p className="sub">Cargando…</p></div>}

        {!loading && !t && !wizard && (
          <>
            <div className="card">
              <div className="row" style={{ justifyContent:"space-between" }}>
                <h3>Mis torneos</h3>
                <div className="row">
                  <button className="btn ghost sm" onClick={() => fileRef.current?.click()}>Importar</button>
                  <input ref={fileRef} type="file" accept="application/json" hidden onChange={e => e.target.files?.[0] && importT(e.target.files[0])} />
                  <button className="btn ball" onClick={() => setWizard(true)}>Crear torneo</button>
                </div>
              </div>
              {!store.ok() && <div className="warn">No hay almacenamiento disponible acá. Podés trabajar igual, pero exportá el JSON antes de cerrar.</div>}
              {importError && <div className="warn">{importError}</div>}
              {!index.length ? (
                <div className="empty"><h3>Todavía no organizaste ningún torneo</h3><p className="sub">Empezá por el nombre, los grupos y desde qué ronda arranca la llave.</p></div>
              ) : (
                <div className="list" style={{ marginTop:12 }}>
                  {index.map(x => (
                    <div className="tcard" key={x.id}>
                      <div style={{ flex:1 }}>
                        <b>{x.name}</b><div className="sub">{x.date}</div>
                      </div>
                      <button className="btn primary sm" onClick={() => openT(x.id)}>Abrir</button>
                      <button className="btn ghost sm" onClick={() => dupT(x.id)}>Duplicar</button>
                      <button className="btn danger sm" onClick={() => requestDelete(x.id, x.name)}>Borrar</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </>
        )}

        {wizard && <Wizard onCancel={() => setWizard(false)} onCreate={x => { setWizard(false); save(x); setTab("Equipos"); }} />}

        {t && tab === "Configuración" && (
          <div className="card">
            <h3>Configuración</h3>
            <div className="grid2">
              <label className="f"><span>Nombre</span><input className="inp" value={t.name} onChange={e => save({ ...t, name:e.target.value })} /></label>
              <label className="f"><span>Fecha</span><input className="inp" type="date" value={t.date} onChange={e => save({ ...t, date:e.target.value })} /></label>
            </div>
            <div className="tblwrap">
              <table>
                <tbody>
                  <tr><td style={{textAlign:"left",fontFamily:"var(--body)"}}>Formato</td><td style={{textAlign:"left"}}>{t.hasGroupStage ? "Grupos + eliminación directa" : "Eliminación directa"}</td></tr>
                  <tr><td style={{textAlign:"left",fontFamily:"var(--body)"}}>Equipos</td><td style={{textAlign:"left"}}>{t.teams.length} / {t.numberOfTeams}</td></tr>
                  {t.hasGroupStage && <tr><td style={{textAlign:"left",fontFamily:"var(--body)"}}>Grupos</td><td style={{textAlign:"left"}}>{t.numberOfGroups} de hasta {t.teamsPerGroup}</td></tr>}
                  {t.hasGroupStage && <tr><td style={{textAlign:"left",fontFamily:"var(--body)"}}>Clasifican</td><td style={{textAlign:"left"}}>{t.qualifiersPerGroup} por grupo</td></tr>}
                  <tr><td style={{textAlign:"left",fontFamily:"var(--body)"}}>Arranca en</td><td style={{textAlign:"left"}}>{ROUND_NAMES[t.knockoutStartRound]}</td></tr>
                  <tr><td style={{textAlign:"left",fontFamily:"var(--body)"}}>Estado</td><td style={{textAlign:"left"}}>{statusOf(t)}</td></tr>
                </tbody>
              </table>
            </div>
            <div className="row" style={{ marginTop:16 }}>
              <button className="btn ghost" onClick={exportT}>Exportar torneo</button>
              <button className="btn danger" onClick={() => requestDelete(t.id, t.name)}>Borrar torneo</button>
            </div>
          </div>
        )}

        {t && tab === "Equipos" && <TeamsTab t={t} save={save} />}
        {t && tab === "Inscripciones" && <RegistrationsTab t={t} save={save} />}
        {t && tab === "Grupos" && <GroupsTab t={t} save={save} />}
        {t && tab === "Posiciones" && <StandingsTab t={t} />}
        {t && tab === "Knockouts" && <KnockoutTab t={t} save={save} />}
        {t && tab === "Vista pública" && <PublicTab t={t} />}
      </div>
      <Confirm open={!!pendingDelete} message={`Se borra "${pendingDelete?.name}" y todos sus resultados. ¿Deseás continuar?`}
        confirmLabel="Borrar" onCancel={() => setPendingDelete(null)} onConfirm={confirmDelete} />
      <SecretModal open={secretModal} onCancel={() => setSecretModal(false)}
        onSave={v => { secretStore.set(v); setSecretModal(false); setSaveError(""); }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
